<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARBITER // NEBULA:FOG 2026</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 24px 48px;
    border-bottom: 2px solid #16213e;
    display: flex;
    align-items: baseline;
    gap: 24px;
  }

  .brand {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #00d4ff;
    text-transform: uppercase;
  }

  .event-name {
    font-size: 18px;
    color: #7f8c8d;
    letter-spacing: 2px;
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #e74c3c;
    margin-left: auto;
    flex-shrink: 0;
  }

  .status-dot.connected {
    background: #2ecc71;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  main {
    flex: 1;
    padding: 48px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .team-name {
    font-size: 32px;
    color: #00d4ff;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 32px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .team-name.visible { opacity: 1; }

  .commentary-text {
    font-size: 48px;
    line-height: 1.4;
    text-align: center;
    max-width: 1400px;
    color: #ffffff;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .commentary-text.visible { opacity: 1; }

  .commentary-text.question {
    color: #f39c12;
    font-style: italic;
  }

  .commentary-text.question::before {
    content: "Q: ";
    color: #e74c3c;
    font-weight: 700;
    font-style: normal;
  }

  .idle-message {
    font-size: 24px;
    color: #34495e;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  footer {
    padding: 16px 48px;
    border-top: 1px solid #16213e;
    text-align: center;
    font-size: 14px;
    color: #34495e;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<header>
  <span class="brand">ARBITER</span>
  <span class="event-name">NEBULA:FOG 2026</span>
  <span class="status-dot" id="statusDot"></span>
</header>

<main>
  <div class="team-name" id="teamName"></div>
  <div class="commentary-text" id="commentaryText"></div>
  <div class="idle-message" id="idleMessage">Awaiting next demo...</div>
</main>

<footer>AI Judge System // Live Commentary</footer>

<script>
(function() {
  var wsUrl = 'ws://' + window.location.host + '/ws/display';
  var ws = null;
  var reconnectDelay = 1000;
  var maxReconnectDelay = 10000;

  var statusDot = document.getElementById('statusDot');
  var teamName = document.getElementById('teamName');
  var commentaryText = document.getElementById('commentaryText');
  var idleMessage = document.getElementById('idleMessage');

  function connect() {
    ws = new WebSocket(wsUrl);

    ws.onopen = function() {
      statusDot.classList.add('connected');
      reconnectDelay = 1000;
    };

    ws.onclose = function() {
      statusDot.classList.remove('connected');
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, maxReconnectDelay);
    };

    ws.onerror = function() {
      ws.close();
    };

    ws.onmessage = function(event) {
      var msg;
      try {
        msg = JSON.parse(event.data);
      } catch (e) {
        return;
      }
      handleMessage(msg);
    };
  }

  function handleMessage(msg) {
    if (msg.type === 'commentary') {
      idleMessage.style.display = 'none';

      teamName.textContent = msg.team_name || '';
      teamName.classList.remove('visible');
      void teamName.offsetWidth;
      teamName.classList.add('visible');

      commentaryText.classList.remove('question', 'visible');
      commentaryText.textContent = msg.text || '';
      void commentaryText.offsetWidth;
      commentaryText.classList.add('visible');

    } else if (msg.type === 'question') {
      idleMessage.style.display = 'none';

      teamName.textContent = msg.team_name || '';
      teamName.classList.remove('visible');
      void teamName.offsetWidth;
      teamName.classList.add('visible');

      commentaryText.classList.remove('visible');
      commentaryText.textContent = msg.text || '';
      commentaryText.classList.add('question');
      void commentaryText.offsetWidth;
      commentaryText.classList.add('visible');

    } else if (msg.type === 'clear') {
      teamName.textContent = '';
      teamName.classList.remove('visible');
      commentaryText.textContent = '';
      commentaryText.classList.remove('visible', 'question');
      idleMessage.style.display = '';
    }
  }

  connect();
})();
</script>
</body>
</html>
