<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARBITER // NEBULA:FOG 2026</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    color: #f0f0f0;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 24px 48px;
    border-bottom: 2px solid #1e2a4a;
    display: flex;
    align-items: baseline;
    gap: 24px;
  }

  .brand {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #00d4ff;
    text-transform: uppercase;
  }

  .event-name {
    font-size: 18px;
    color: #a8b2d0;
    letter-spacing: 2px;
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #e74c3c;
    margin-left: auto;
    flex-shrink: 0;
  }

  .status-dot.connected {
    background: #2ecc71;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  main {
    flex: 1;
    padding: 48px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .team-name {
    font-size: 32px;
    color: #00d4ff;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 32px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .team-name.visible { opacity: 1; }

  .commentary-text {
    font-size: 48px;
    line-height: 1.4;
    text-align: center;
    max-width: 1400px;
    color: #ffffff;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .commentary-text.visible { opacity: 1; }

  .commentary-text.question {
    color: #f39c12;
    font-style: italic;
  }

  .commentary-text.question::before {
    content: "Q: ";
    color: #e74c3c;
    font-weight: 700;
    font-style: normal;
  }

  .idle-message {
    font-size: 36px;
    color: #a8b2d0;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Capture started / analyzing screen */
  #capture-screen {
    display: none;
    text-align: center;
  }

  #capture-screen.visible { display: block; }

  .capture-team {
    font-size: 40px;
    font-weight: 700;
    color: #00d4ff;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .capture-track {
    font-size: 18px;
    color: #a8b2d0;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .capture-status {
    font-size: 28px;
    color: #f0f0f0;
    letter-spacing: 2px;
    animation: analyzePulse 2s ease-in-out infinite;
  }

  .capture-visualizer {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 32px;
  }

  .capture-bar {
    width: 4px;
    height: 40px;
    background: #00d4ff;
    border-radius: 2px;
    animation: barBounce 1.2s ease-in-out infinite;
  }

  .capture-bar:nth-child(1) { animation-delay: 0s; }
  .capture-bar:nth-child(2) { animation-delay: 0.1s; }
  .capture-bar:nth-child(3) { animation-delay: 0.2s; }
  .capture-bar:nth-child(4) { animation-delay: 0.3s; }
  .capture-bar:nth-child(5) { animation-delay: 0.4s; }
  .capture-bar:nth-child(6) { animation-delay: 0.5s; }
  .capture-bar:nth-child(7) { animation-delay: 0.6s; }
  .capture-bar:nth-child(8) { animation-delay: 0.7s; }
  .capture-bar:nth-child(9) { animation-delay: 0.8s; }
  .capture-bar:nth-child(10) { animation-delay: 0.9s; }
  .capture-bar:nth-child(11) { animation-delay: 1.0s; }
  .capture-bar:nth-child(12) { animation-delay: 1.1s; }

  @keyframes barBounce {
    0%, 100% { transform: scaleY(0.3); opacity: 0.4; }
    50% { transform: scaleY(1); opacity: 1; }
  }

  @keyframes analyzePulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Injection blocked screen */
  #injection-screen {
    display: none;
    text-align: center;
  }

  #injection-screen.visible { display: block; }

  .injection-alert {
    font-size: 48px;
    font-weight: 700;
    color: #e74c3c;
    letter-spacing: 6px;
    text-transform: uppercase;
    text-shadow: 0 0 30px rgba(231, 76, 60, 0.6), 0 0 60px rgba(231, 76, 60, 0.3);
    animation: alertFlash 0.8s ease-in-out 3;
    margin-bottom: 24px;
  }

  .injection-team {
    font-size: 28px;
    color: #f39c12;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .injection-category {
    font-size: 18px;
    color: #a8b2d0;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .injection-roast {
    font-size: 32px;
    line-height: 1.5;
    color: #f0f0f0;
    max-width: 1200px;
    font-style: italic;
  }

  @keyframes alertFlash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* Intermission leaderboard */
  #intermission-screen {
    display: none;
    text-align: center;
    width: 100%;
    max-width: 900px;
  }

  #intermission-screen.visible { display: block; }

  .intermission-title {
    font-size: 32px;
    font-weight: 700;
    color: #00d4ff;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
    margin-bottom: 32px;
  }

  .intermission-row {
    display: flex;
    align-items: center;
    padding: 14px 24px;
    border-bottom: 1px solid #1e2a4a;
    opacity: 0;
    transform: translateX(-20px);
    animation: slideIn 0.5s ease-out forwards;
  }

  .intermission-rank {
    font-size: 28px;
    font-weight: 700;
    color: #ffd700;
    min-width: 50px;
    text-align: center;
  }

  .intermission-team-name {
    flex: 1;
    font-size: 22px;
    font-weight: 600;
    color: #f0f0f0;
    letter-spacing: 1px;
    text-align: left;
  }

  .intermission-score {
    font-size: 24px;
    font-weight: 700;
    color: #ffffff;
    min-width: 70px;
    text-align: right;
  }

  .intermission-injections {
    font-size: 14px;
    color: #e74c3c;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 24px;
  }

  footer {
    padding: 16px 48px;
    border-top: 1px solid #1e2a4a;
    text-align: center;
    font-size: 14px;
    color: #a8b2d0;
    letter-spacing: 1px;
  }

  /* Score card overlay */
  #score-card {
    display: none;
    background: #0f0f23;
    border: 2px solid #1e2a4a;
    border-radius: 16px;
    padding: 40px 48px;
    max-width: 900px;
    width: 100%;
    margin-top: 32px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  #score-card.visible { opacity: 1; }

  .score-header {
    font-size: 36px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 4px;
    text-align: center;
    color: #00d4ff;
    text-shadow: 0 0 20px rgba(0, 212, 255, 0.5), 0 0 40px rgba(0, 212, 255, 0.2);
    margin-bottom: 12px;
    animation: glowPulse 2s ease-in-out infinite;
  }

  .score-label {
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #a8b2d0;
    text-align: center;
    margin-bottom: 32px;
  }

  .score-criterion {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid #1e2a4a;
    opacity: 0;
    transform: translateX(-30px);
    animation: slideIn 0.6s ease-out forwards;
  }

  .criterion-name {
    flex: 1;
    font-size: 22px;
    font-weight: 600;
    color: #f0f0f0;
    letter-spacing: 1px;
  }

  .criterion-value {
    font-size: 30px;
    font-weight: 700;
    color: #ffffff;
    min-width: 60px;
    text-align: right;
  }

  .score-bar-track {
    width: 100%;
    height: 14px;
    background: #1e2a4a;
    border-radius: 4px;
    margin-top: 8px;
    overflow: hidden;
  }

  .score-bar {
    height: 100%;
    border-radius: 4px;
    width: 0;
    transition: width 1s ease-out;
    background: linear-gradient(90deg, #e74c3c 0%, #f39c12 40%, #2ecc71 70%, #00d4ff 100%);
    background-size: 1000% 100%;
  }

  .score-justification {
    width: 100%;
    font-size: 16px;
    font-style: italic;
    color: #a8b2d0;
    margin-top: 6px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .score-total-section {
    text-align: center;
    padding-top: 32px;
    margin-top: 16px;
  }

  .score-total-value {
    font-size: 72px;
    font-weight: 700;
    animation: scorePulse 1.5s ease-in-out infinite;
  }

  .score-total-label {
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #a8b2d0;
    margin-top: 8px;
  }

  .score-track {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #00d4ff;
    margin-top: 12px;
  }

  @keyframes slideIn {
    from { transform: translateX(-30px); opacity: 0; }
    to   { transform: translateX(0);     opacity: 1; }
  }

  @keyframes scorePulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.15); }
  }

  @keyframes glowPulse {
    0%, 100% { text-shadow: 0 0 20px rgba(0,212,255,0.5), 0 0 40px rgba(0,212,255,0.2); }
    50%      { text-shadow: 0 0 30px rgba(0,212,255,0.8), 0 0 60px rgba(0,212,255,0.4); }
  }

  /* Deliberation rankings */
  #deliberation-card {
    display: none;
    background: #0f0f23;
    border: 2px solid #1e2a4a;
    border-radius: 16px;
    padding: 40px 48px;
    max-width: 1000px;
    width: 100%;
    margin-top: 32px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  #deliberation-card.visible { opacity: 1; }

  .deliberation-title {
    font-size: 36px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 4px;
    text-align: center;
    color: #00d4ff;
    text-shadow: 0 0 20px rgba(0, 212, 255, 0.5), 0 0 40px rgba(0, 212, 255, 0.2);
    margin-bottom: 32px;
    animation: glowPulse 2s ease-in-out infinite;
  }

  .deliberation-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    padding: 18px 0;
    border-bottom: 1px solid #1e2a4a;
    opacity: 0;
    transform: translateX(-30px);
    animation: slideIn 0.6s ease-out forwards;
  }

  .deliberation-rank {
    font-size: 32px;
    font-weight: 700;
    color: #ffd700;
    min-width: 60px;
    text-align: center;
  }

  .deliberation-team {
    flex: 1;
    font-size: 24px;
    font-weight: 600;
    color: #f0f0f0;
    letter-spacing: 1px;
  }

  .deliberation-score {
    font-size: 28px;
    font-weight: 700;
    color: #ffffff;
    min-width: 80px;
    text-align: right;
  }

  .deliberation-track {
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #00d4ff;
    margin-left: 60px;
  }

  .deliberation-reasoning {
    width: 100%;
    font-size: 16px;
    font-style: italic;
    color: #a8b2d0;
    margin-top: 6px;
    margin-left: 60px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .deliberation-narrative {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 2px solid #1e2a4a;
    font-size: 22px;
    line-height: 1.6;
    color: #f0f0f0;
    white-space: pre-wrap;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .deliberation-narrative.visible { opacity: 1; }
</style>
</head>
<body>

<header>
  <span class="brand">ARBITER</span>
  <span class="event-name">NEBULA:FOG 2026</span>
  <span class="status-dot" id="statusDot"></span>
</header>

<main>
  <div class="team-name" id="teamName"></div>
  <div class="commentary-text" id="commentaryText"></div>
  <div class="idle-message" id="idleMessage">Awaiting next demo...</div>
  <div id="capture-screen">
    <div class="capture-team" id="captureTeam"></div>
    <div class="capture-track" id="captureTrack"></div>
    <div class="capture-status">LISTENING // ANALYZING</div>
    <div class="capture-visualizer">
      <div class="capture-bar"></div><div class="capture-bar"></div><div class="capture-bar"></div>
      <div class="capture-bar"></div><div class="capture-bar"></div><div class="capture-bar"></div>
      <div class="capture-bar"></div><div class="capture-bar"></div><div class="capture-bar"></div>
      <div class="capture-bar"></div><div class="capture-bar"></div><div class="capture-bar"></div>
    </div>
  </div>
  <div id="injection-screen">
    <div class="injection-alert">INJECTION BLOCKED</div>
    <div class="injection-team" id="injectionTeam"></div>
    <div class="injection-category" id="injectionCategory"></div>
    <div class="injection-roast" id="injectionRoast"></div>
  </div>
  <div id="intermission-screen">
    <div class="intermission-title">LEADERBOARD</div>
    <div id="intermissionRows"></div>
    <div class="intermission-injections" id="intermissionInjections"></div>
  </div>
  <div id="deliberation-card">
    <div class="deliberation-title">FINAL RANKINGS</div>
    <div id="deliberationRankings"></div>
    <div class="deliberation-narrative" id="deliberationNarrative"></div>
  </div>
  <div id="score-card">
    <div class="score-header" id="scoreHeader"></div>
    <div class="score-label">SCORING</div>
    <div id="scoreCriteria"></div>
    <div class="score-total-section" id="scoreTotalSection" style="display:none"></div>
  </div>
</main>

<footer>AI Judge System // Live Commentary</footer>

<script>
(function() {
  var wsUrl = 'ws://' + window.location.host + '/ws/display';
  var ws = null;
  var reconnectDelay = 1000;
  var maxReconnectDelay = 10000;

  var statusDot = document.getElementById('statusDot');
  var teamName = document.getElementById('teamName');
  var commentaryText = document.getElementById('commentaryText');
  var idleMessage = document.getElementById('idleMessage');
  var scoreCard = document.getElementById('score-card');
  var scoreHeader = document.getElementById('scoreHeader');
  var scoreCriteria = document.getElementById('scoreCriteria');
  var scoreTotalSection = document.getElementById('scoreTotalSection');
  var deliberationCard = document.getElementById('deliberation-card');
  var deliberationRankings = document.getElementById('deliberationRankings');
  var deliberationNarrative = document.getElementById('deliberationNarrative');
  var captureScreen = document.getElementById('capture-screen');
  var captureTeam = document.getElementById('captureTeam');
  var captureTrack = document.getElementById('captureTrack');
  var injectionScreen = document.getElementById('injection-screen');
  var injectionTeam = document.getElementById('injectionTeam');
  var injectionCategory = document.getElementById('injectionCategory');
  var injectionRoast = document.getElementById('injectionRoast');
  var intermissionScreen = document.getElementById('intermission-screen');
  var intermissionRows = document.getElementById('intermissionRows');
  var intermissionInjections = document.getElementById('intermissionInjections');

  function hideAllScreens() {
    idleMessage.style.display = 'none';
    captureScreen.classList.remove('visible');
    injectionScreen.classList.remove('visible');
    intermissionScreen.classList.remove('visible');
    teamName.textContent = '';
    teamName.classList.remove('visible');
    commentaryText.textContent = '';
    commentaryText.classList.remove('visible', 'question');
    scoreCard.style.display = 'none';
    scoreCard.classList.remove('visible');
    deliberationCard.style.display = 'none';
    deliberationCard.classList.remove('visible');
    // Clear accumulated dynamic children to prevent stale DOM after many demos
    while (intermissionRows.firstChild) intermissionRows.removeChild(intermissionRows.firstChild);
    while (deliberationRankings.firstChild) deliberationRankings.removeChild(deliberationRankings.firstChild);
    deliberationNarrative.textContent = '';
    deliberationNarrative.classList.remove('visible');
    while (scoreCriteria.firstChild) scoreCriteria.removeChild(scoreCriteria.firstChild);
    scoreTotalSection.style.display = 'none';
    while (scoreTotalSection.firstChild) scoreTotalSection.removeChild(scoreTotalSection.firstChild);
  }

  function connect() {
    ws = new WebSocket(wsUrl);

    ws.onopen = function() {
      statusDot.classList.add('connected');
      reconnectDelay = 1000;
    };

    ws.onclose = function() {
      statusDot.classList.remove('connected');
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, maxReconnectDelay);
    };

    ws.onerror = function() {
      // onerror is always followed by onclose per WebSocket spec; let onclose handle reconnect
    };

    ws.onmessage = function(event) {
      var msg;
      try {
        msg = JSON.parse(event.data);
      } catch (e) {
        return;
      }
      handleMessage(msg);
    };
  }

  function handleMessage(msg) {
    if (msg.type === 'ping') {
      try { ws.send(JSON.stringify({type: 'pong'})); } catch(e) {}
      return;
    }

    if (msg.type === 'capture_started') {
      hideAllScreens();
      captureTeam.textContent = msg.team_name || '';
      captureTrack.textContent = msg.track ? 'TRACK: ' + msg.track : '';
      captureScreen.classList.add('visible');

    } else if (msg.type === 'injection_blocked') {
      hideAllScreens();
      injectionTeam.textContent = msg.team_name || '';
      injectionCategory.textContent = msg.category || '';
      injectionRoast.textContent = msg.roast || '';
      // Reset alertFlash animation so it replays on repeated injections
      var alertEl = injectionScreen.querySelector('.injection-alert');
      alertEl.style.animation = 'none';
      void alertEl.offsetWidth;
      alertEl.style.animation = '';
      injectionScreen.classList.add('visible');

    } else if (msg.type === 'intermission') {
      hideAllScreens();
      while (intermissionRows.firstChild) intermissionRows.removeChild(intermissionRows.firstChild);
      var lb = msg.leaderboard || [];
      for (var i = 0; i < lb.length; i++) {
        var entry = lb[i];
        var row = document.createElement('div');
        row.className = 'intermission-row';
        row.style.animationDelay = (i * 0.3) + 's';

        var rankEl = document.createElement('span');
        rankEl.className = 'intermission-rank';
        rankEl.textContent = '#' + (i + 1);

        var nameEl = document.createElement('span');
        nameEl.className = 'intermission-team-name';
        nameEl.textContent = entry.team_name || '';

        var scoreEl = document.createElement('span');
        scoreEl.className = 'intermission-score';
        scoreEl.textContent = entry.score != null ? entry.score.toFixed(1) : '—';

        row.appendChild(rankEl);
        row.appendChild(nameEl);
        row.appendChild(scoreEl);
        intermissionRows.appendChild(row);
      }
      if (msg.total_injections > 0) {
        intermissionInjections.textContent = msg.total_injections + ' INJECTION ATTEMPT' + (msg.total_injections !== 1 ? 'S' : '') + ' BLOCKED';
      } else {
        intermissionInjections.textContent = '';
      }
      intermissionScreen.classList.add('visible');

    } else if (msg.type === 'commentary') {
      hideAllScreens();

      teamName.textContent = msg.team_name || '';
      teamName.classList.remove('visible');
      void teamName.offsetWidth;
      teamName.classList.add('visible');

      commentaryText.classList.remove('question', 'visible');
      commentaryText.textContent = msg.text || '';
      void commentaryText.offsetWidth;
      commentaryText.classList.add('visible');

    } else if (msg.type === 'question') {
      hideAllScreens();

      teamName.textContent = msg.team_name || '';
      teamName.classList.remove('visible');
      void teamName.offsetWidth;
      teamName.classList.add('visible');

      commentaryText.classList.remove('visible');
      void commentaryText.offsetWidth;
      commentaryText.textContent = msg.text || '';
      commentaryText.classList.add('question');
      commentaryText.classList.add('visible');

    } else if (msg.type === 'score_intro') {
      hideAllScreens();
      scoreHeader.textContent = msg.team_name || '';
      scoreCard.style.display = 'block';
      void scoreCard.offsetWidth;
      scoreCard.classList.add('visible');

    } else if (msg.type === 'score_criterion') {
      var idx = scoreCriteria.children.length;
      var row = document.createElement('div');
      row.className = 'score-criterion';
      row.style.animationDelay = (idx * 0.5) + 's';

      var nameEl = document.createElement('span');
      nameEl.className = 'criterion-name';
      nameEl.textContent = msg.name || '';

      var valEl = document.createElement('span');
      valEl.className = 'criterion-value';
      valEl.textContent = (msg.score != null ? msg.score.toFixed(1) : '0') + '/10';

      var barTrack = document.createElement('div');
      barTrack.className = 'score-bar-track';
      var bar = document.createElement('div');
      bar.className = 'score-bar';
      var pct = Math.max(0, Math.min(100, ((msg.score || 0) / 10) * 100));
      bar.style.backgroundPosition = (100 - pct) + '% 0';
      barTrack.appendChild(bar);

      var justEl = document.createElement('div');
      justEl.className = 'score-justification';
      justEl.textContent = msg.justification || '';

      row.appendChild(nameEl);
      row.appendChild(valEl);
      row.appendChild(barTrack);
      row.appendChild(justEl);
      scoreCriteria.appendChild(row);

      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          bar.style.width = pct + '%';
        });
      });

    } else if (msg.type === 'score_total') {
      scoreTotalSection.style.display = 'block';
      var total = msg.total_score != null ? msg.total_score : 0;

      var color;
      if (total < 4)      color = '#e74c3c';
      else if (total < 6) color = '#f39c12';
      else if (total < 8) color = '#2ecc71';
      else                color = '#ffd700';

      while (scoreTotalSection.firstChild) scoreTotalSection.removeChild(scoreTotalSection.firstChild);

      var totalVal = document.createElement('div');
      totalVal.className = 'score-total-value';
      totalVal.style.color = color;
      totalVal.textContent = total.toFixed(1);

      var totalLabel = document.createElement('div');
      totalLabel.className = 'score-total-label';
      totalLabel.textContent = msg.team_name || '';

      var trackLabel = document.createElement('div');
      trackLabel.className = 'score-track';
      trackLabel.textContent = msg.track || '';

      scoreTotalSection.appendChild(totalVal);
      scoreTotalSection.appendChild(totalLabel);
      scoreTotalSection.appendChild(trackLabel);

    } else if (msg.type === 'deliberation_ranking') {
      // Only reset screens on the first ranking; subsequent ones accumulate
      if (deliberationRankings.children.length === 0) {
        hideAllScreens();
      }
      deliberationCard.style.display = 'block';
      void deliberationCard.offsetWidth;
      deliberationCard.classList.add('visible');

      var rIdx = deliberationRankings.children.length;
      var row = document.createElement('div');
      row.className = 'deliberation-row';
      row.style.animationDelay = (rIdx * 0.6) + 's';

      var rankEl = document.createElement('span');
      rankEl.className = 'deliberation-rank';
      rankEl.textContent = '#' + (msg.rank != null ? msg.rank : '?');

      var teamEl = document.createElement('span');
      teamEl.className = 'deliberation-team';
      teamEl.textContent = msg.team_name || '';

      var scoreEl = document.createElement('span');
      scoreEl.className = 'deliberation-score';
      scoreEl.textContent = (msg.total_score != null ? msg.total_score.toFixed(1) : '0');

      var trackEl = document.createElement('div');
      trackEl.className = 'deliberation-track';
      trackEl.textContent = msg.track || '';

      var reasonEl = document.createElement('div');
      reasonEl.className = 'deliberation-reasoning';
      reasonEl.textContent = msg.reasoning || '';

      row.appendChild(rankEl);
      row.appendChild(teamEl);
      row.appendChild(scoreEl);
      row.appendChild(trackEl);
      row.appendChild(reasonEl);
      deliberationRankings.appendChild(row);

    } else if (msg.type === 'deliberation_narrative') {
      deliberationNarrative.textContent = msg.narrative || '';
      void deliberationNarrative.offsetWidth;
      deliberationNarrative.classList.add('visible');

    } else if (msg.type === 'clear') {
      hideAllScreens();
      idleMessage.style.display = '';
    }
  }

  connect();
})();
</script>
</body>
</html>
